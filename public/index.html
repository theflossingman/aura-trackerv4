<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4A90E2">
<title>Aura Tracker</title>
<link rel="manifest" href="/manifest.json">
<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" href="/favicon.png">
<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120x120.png">
<link rel="apple-touch-icon" sizes="114x114" href="/icon-114x114.png">
<link rel="apple-touch-icon" sizes="76x76" href="/icon-76x76.png">
<link rel="apple-touch-icon" sizes="72x72" href="/icon-72x72.png">
<link rel="apple-touch-icon" sizes="60x60" href="/icon-60x60.png">
<link rel="apple-touch-icon" sizes="57x57" href="/icon-57x57.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  /* --- GLOBAL STYLES --- */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  html {
    background: linear-gradient(135deg, #87CEEB, #9B59B6, #4A90E2);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    background-attachment: fixed;
    background-color: #4A90E2;
    height: 100%;
    min-height: 100vh;
  }
  body { 
    background: linear-gradient(135deg, #87CEEB, #9B59B6, #4A90E2);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    background-attachment: fixed;
    min-height: 100vh;
    height: 100dvh; /* dynamic viewport height */
    overflow: hidden;
    margin: 0;
    padding: 0;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #4A90E2; /* added fallback background color */
  }
  
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* --- GLASS LOGIN --- */
  #loginContainer { backdrop-filter: blur(12px); background-color: rgba(255,255,255,0.1); padding:40px; border-radius:15px; display:flex; flex-direction:column; align-items:center; width:300px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
  #loginContainer h1 { 
    color:white; 
    margin-bottom:20px; 
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
    font-family: 'Bangers', 'Permanent Marker', 'Luckiest Guy', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
  }
  #loginContainer input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; outline:none; }
  #loginContainer button { padding:10px 20px; margin-top:15px; border:none; border-radius:8px; background: #00f6ff; color:#000; font-weight:bold; cursor:pointer; transition: 0.2s; }
  #loginContainer button:hover { background:#00c0cc; }

  /* --- DASHBOARD --- */
  #dashboard { 
    display:none; 
    flex-direction:column; 
    height:100vh; 
    width:100vw; 
    color:white;
    opacity: 0;
    transition: opacity 0.5s ease;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  /* Mobile-first responsive design */
  @media (max-width: 768px) {
    body {
      align-items: center;
      padding: 0;
    }
    
    #loginContainer {
      width: 90%;
      max-width: 350px;
      margin: 20px auto;
      padding: 30px 20px;
    }
    
    #topBar {
      padding: 10px 15px;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }
    
    #topBar h2 {
      font-size: 1.5rem;
      margin: 0;
    }
    
    #achievementsBtn {
      font-size: 0.9rem;
      padding: 6px 12px;
    }
    
    #cardsContainer {
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px 15px;
      max-width: 100%;
    }
    
    .userCard {
      height: 160px;
      padding: 15px;
    }
    
    .user-name {
      font-size: 1.4rem;
    }
    
    .aura-count {
      font-size: 1.8rem;
    }
    
    #slidePanel {
      width: 95%;
      max-width: 400px;
      height: 400px;
      bottom: -420px;
    }
    
    #bottomLeft {
      bottom: 15px;
      left: 15px;
      right: 15px;
      justify-content: center;
      gap: 15px;
    }
    
    #bottomLeft button {
      flex: 1;
      max-width: 150px;
    }
  }
  
  @media (max-width: 480px) {
    #cardsContainer {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 15px 10px;
      max-width: 100%;
    }
    
    .userCard {
      height: 140px;
      padding: 12px;
    }
    
    .user-name {
      font-size: 1.2rem;
    }
    
    .aura-count {
      font-size: 1.6rem;
    }
    
    #slidePanel {
      width: 100%;
      border-radius: 20px 20px 0 0;
    }
  }
  #topBar { display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.2); }
  #cardsContainer { 
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding:30px;
    justify-content: center;
    align-content: start;
    flex:1;
    overflow-y: auto;
    max-width: 800px;
    margin: 0 auto;
    min-height: 0;
  }
  
  .userCard { 
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    position: relative;
    height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    min-height: 160px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  
  .userCard::before {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    right: 1px;
    height: 4px;
    background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform 0.4s ease;
    border-radius: 11px 11px 0 0;
  }
  
  .userCard:hover::before {
    transform: scaleX(1);
  }
  
  .userCard:hover { 
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.5);
  }
  
  .userCard:active {
    transform: translateY(-2px) scale(1.01);
    transition: all 0.1s ease;
  }
  
  .user-avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 5px;
  }
  .user-name {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .user-aura {
    margin-bottom: 4px;
    text-shadow: none;
  }
  
  .aura-label {
    font-size: 1rem;
    font-weight: 600;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  
  .aura-count {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #feca57, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .user-role {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 0.6rem;
    font-weight: 500;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .user-role.admin {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    border-color: rgba(255, 107, 107, 0.5);
  }

  .user-name-tag {
    font-size: 0.9rem;
    font-weight: 600;
    color: #ffd700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    margin-top: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    background: rgba(255,215,0,0.2);
    border: 1px solid rgba(255,215,0,0.4);
    text-align: center;
  }

  .name-tag-card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 15px;
    margin: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    position: relative;
  }

  .name-tag-card:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }

  .name-tag-card.equipped {
    background: rgba(255,215,0,0.2);
    border-color: gold;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
  }

  .name-tag-status {
    font-size: 24px;
    margin-bottom: 8px;
  }

  .name-tag-name {
    font-weight: bold;
    color: white;
    margin-bottom: 5px;
    font-size: 0.9rem;
  }

  .name-tag-description {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
  }

  .equip-btn {
    background: linear-gradient(135deg, #00f6ff, #00c0cc);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.8rem;
  }

  .equip-btn:hover {
    background: linear-gradient(135deg, #00c0cc, #00a0aa);
    transform: scale(1.05);
  }

  .customization-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
  }

  .customization-tab-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.7);
    padding: 10px 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    border-bottom: 2px solid transparent;
  }

  .customization-tab-btn.active {
    color: #00f6ff;
    border-bottom-color: #00f6ff;
  }

  .customization-tab-btn:hover {
    color: #00f6ff;
  }

  .customization-tab-content {
    display: none;
  }

  .customization-tab-content.active {
    display: block;
  }

  #nameTagGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
  }

  .unequip-all-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.8rem;
  }

  .unequip-all-btn:hover {
    background: linear-gradient(135deg, #ee5a24, #c44569);
    transform: scale(1.05);
  }

  /* --- SLIDE PANEL --- */
  #slidePanel { 
    position:fixed; 
    bottom: -450px; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 90%; 
    max-width: 350px;
    height: 400px;
    background: rgba(0,0,0,0.95); 
    backdrop-filter: blur(15px); 
    transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
    padding:20px; 
    overflow-y:auto; 
    border-radius: 20px 20px 0 0; 
    box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    z-index: 1000;
  }
  #slidePanel.open { bottom: 0; }
  #slidePanel h2 { margin-bottom:15px; }
  .tabBtns { display:flex; gap:10px; margin-bottom:15px; }
  .tabBtns button { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#00f6ff; color:#000; font-weight:bold; transition:0.2s; }
  .tabBtns button.active { background:#00c0cc; }
  .tabContent { display:none; }
  .tabContent.active { display:block; }
  .actionBtn { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px; cursor:pointer; background:#00f6ff; color:#000; font-weight:bold; transition:0.2s; }
  .actionBtn:hover { background:#00c0cc; }

  /* --- CHART STYLING --- */
  #graphTab {
    padding: 10px;
    height: 250px;
  }

  #auraChart {
    width: 100% !important;
    height: 100% !important;
  }

  /* --- LOGOUT + SETTINGS --- */
  #bottomLeft { 
    position:fixed; 
    bottom:20px; 
    left:20px; 
    right:20px;
    display:flex; 
    gap:10px; 
    justify-content: center;
    flex-wrap: wrap;
  }
  #bottomLeft button { 
    padding:12px 20px; 
    border:none; 
    border-radius:8px; 
    cursor:pointer; 
    font-weight:bold; 
    background:#00f6ff; 
    color:#000; 
    transition:0.2s;
    min-height: 44px;
    min-width: 44px;
    touch-action: manipulation;
  }
  #bottomLeft button:hover { background:#00c0cc; }

  /* --- LOGIN ANIMATIONS --- */
  #loginContainer.shake {
    animation: shake 0.5s ease-in-out;
  }
  
  #loginContainer.success {
    animation: loginSuccess 0.5s ease-out forwards;
  }
  
  @keyframes loginSuccess {
    0% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
    50% {
      transform: scale(1.2) rotate(180deg);
      opacity: 0.8;
    }
    100% {
      transform: scale(0) rotate(360deg);
      opacity: 0;
    }
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
    20%, 40%, 60%, 80% { transform: translateX(10px); }
  }
  
  .dumb-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 0, 0, 0.9);
    color: white;
    padding: 20px 30px;
    border-radius: 15px;
    font-size: 24px;
    font-weight: bold;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  
  .dumb-message.show {
    opacity: 1;
  }

  /* --- LIVE NOTIFICATIONS --- */
  .live-notification {
    position: fixed;
    top: 80px;
    right: 20px;
    z-index: 3001;
    pointer-events: none;
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.3s ease;
    max-width: 320px;
  }
  
  .live-notification.show {
    opacity: 1;
    transform: translateX(0);
  }
  
  .live-notification-content {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }
  
  .live-notification-icon {
    font-size: 20px;
    flex-shrink: 0;
  }
  
  .live-notification-message {
    flex: 1;
    line-height: 1.4;
  }

</style>
</head>
<body>

<!-- Socket.IO Client -->
<script src="/socket.io/socket.io.js"></script>

<!-- LOGIN -->
<div id="loginContainer">
  <h1>Aura Tracker</h1>
  <input type="text" id="usernameInput" placeholder="Username">
  <input type="password" id="passwordInput" placeholder="Password">
  <button id="loginBtn">Sign In</button>
  <div id="announcementBox" style="margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 8px; text-align: center; color: white; font-size: 14px; min-height: 40px; display: flex; align-items: center; justify-content: center;"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div id="topBar">
    <h2 id="welcomeMsg"></h2>
    <button id="achievementsBtn" style="background: rgba(255,215,0,0.2); border: 2px solid gold; color: gold; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s;">🏆 Achievements</button>
  </div>

  <div id="cardsContainer"></div>

  <!-- SLIDE PANEL -->
  <div id="slidePanel">
    <h2 id="panelUserName"></h2>
    <button id="closePanelBtn" style="position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 30px; height: 30px; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">×</button>
    <div class="tabBtns">
      <button class="tabBtn active" data-tab="actionsTab">Actions</button>
      <button class="tabBtn" data-tab="graphTab">Graph</button>
    </div>
    <div id="actionsTab" class="tabContent active">
      <button class="actionBtn" id="giveAuraBtn">➕ Give Aura</button>
      <button class="actionBtn" id="removeAuraBtn">➖ Remove Aura</button>
    </div>
    <div id="graphTab" class="tabContent">
      <canvas id="auraChart"></canvas>
    </div>
  </div>

  <!-- NOTIFICATION CONTAINER -->
  <div id="notificationContainer"></div>

  <!-- BOTTOM LEFT BUTTONS -->
  <div id="bottomLeft">
    <button id="logoutBtn">Logout</button>
    <button id="settingsBtn" style="display:none;">Settings</button>
    <button id="cardCustomizationBtn">Card Customization</button>
  </div>

  <!-- ACHIEVEMENTS MODAL -->
  <div id="achievementsModal">
    <div class="modal-backdrop">
      <div class="modal-content">
        <div class="modal-header">
          <h2>🏆 Achievements</h2>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="achievement-tabs">
            <button class="achievement-tab-btn active" data-tab="gaining">Gaining Aura</button>
            <button class="achievement-tab-btn" data-tab="giving">Giving Aura</button>
          </div>
          <div id="gainingTab" class="achievement-tab-content active">
            <div id="gainingGrid"></div>
          </div>
          <div id="givingTab" class="achievement-tab-content">
            <div id="givingGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CARD CUSTOMIZATION MODAL -->
  <div id="cardCustomizationModal">
    <div class="modal-backdrop">
      <div class="modal-content">
        <div class="modal-header">
          <h2>🎨 Card Customization</h2>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="customization-tabs">
            <button class="customization-tab-btn active" data-tab="nameTag">Name Tag</button>
          </div>
          <div id="nameTagTab" class="customization-tab-content active">
            <h3 style="color: white; margin-bottom: 15px;">Select a Name Tag</h3>
            <div id="nameTagGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ======= PRELOADED USERS ======= */
let users = [];
let currentUser = null;
let selectedUser = null;
let chart = null;
let failedAttempts = 0; // Track failed login attempts
let auraHistory = {}; // Store aura history for each user
let socket = null; // Socket.IO connection

// Initialize Socket.IO connection
function initializeSocket() {
  socket = io();
  
  socket.on('connect', () => {
    console.log('🔌 Connected to real-time server');
  });
  
  socket.on('disconnect', () => {
    console.log('🔌 Disconnected from real-time server');
  });
  
  socket.on('auraUpdate', (data) => {
    handleRealtimeUpdate(data);
  });
}

// Handle real-time updates
function handleRealtimeUpdate(data) {
  console.log('🔄 Real-time update received:', data);
  
  // Show live notification
  showLiveNotification(data.message, data.type === 'give' ? 'success' : 'warning');
  
  // Update user data locally
  if (data.giver) {
    const giverIndex = users.findIndex(u => u.username === data.giver.username);
    if (giverIndex !== -1) {
      users[giverIndex].aura = data.giver.aura;
      users[giverIndex].totalGiven = data.giver.totalGiven;
    }
  }
  
  if (data.receiver) {
    const receiverIndex = users.findIndex(u => u.username === data.receiver.username);
    if (receiverIndex !== -1) {
      users[receiverIndex].aura = data.receiver.aura;
      users[receiverIndex].totalReceived = data.receiver.totalReceived;
    }
  }
  
  if (data.target) {
    const targetIndex = users.findIndex(u => u.username === data.target.username);
    if (targetIndex !== -1) {
      users[targetIndex].aura = data.target.aura;
      users[targetIndex].totalReceived = data.target.totalReceived;
    }
  }
  
  if (data.remover) {
    const removerIndex = users.findIndex(u => u.username === data.remover.username);
    if (removerIndex !== -1) {
      users[removerIndex].aura = data.remover.aura;
      users[removerIndex].totalGiven = data.remover.totalGiven;
    }
  }
  
  // Re-render cards to show updated values
  renderCards();
  
  // Update slide panel if it's open for the affected user
  if (selectedUser && 
      ((data.receiver && data.receiver.username === selectedUser.username) ||
       (data.target && data.target.username === selectedUser.username))) {
    openSlidePanel();
  }
  
  // Show achievement unlock notifications
  if (data.newAchievements) {
    [...data.newAchievements.giver, ...data.newAchievements.receiver].forEach(achievement => {
      if (achievement) {
        showAchievementUnlock(achievement);
      }
    });
  }
}

// Initialize aura history for users
function initializeAuraHistory() {
  users.forEach(user => {
    if (!auraHistory[user.username]) {
      auraHistory[user.username] = [
        {
          time: new Date().toLocaleTimeString(),
          timestamp: Date.now(),
          aura: user.aura
        }
      ];
    } else {
      // Add current aura as latest entry if history exists but is old
      const lastEntry = auraHistory[user.username][auraHistory[user.username].length - 1];
      const twelveHoursAgo = Date.now() - (12 * 60 * 60 * 1000);
      
      if (lastEntry.timestamp < twelveHoursAgo) {
        addAuraHistoryEntry(user.username, user.aura);
      }
    }
  });
}

// Add aura change to history
function addAuraHistoryEntry(username, newAura) {
  if (!auraHistory[username]) {
    auraHistory[username] = [];
  }
  
  const entry = {
    time: new Date().toLocaleTimeString(),
    timestamp: Date.now(),
    aura: newAura
  };
  
  auraHistory[username].push(entry);
  
  // Keep entries from the last 24 hours only
  const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
  auraHistory[username] = auraHistory[username].filter(entry => entry.timestamp > twentyFourHoursAgo);
}

function getTodayString() {
  return new Date().toDateString();
}

function checkAndResetDailyLimits() {
  const today = getTodayString();
  const lastReset = localStorage.getItem('lastAuraReset');
  
  if (lastReset !== today) {
    // Reset all net daily aura to 0
    users.forEach(user => {
      if (user.netDailyAura) {
        Object.keys(user.netDailyAura).forEach(giver => {
          user.netDailyAura[giver] = 0;
        });
      }
    });
    localStorage.setItem('lastAuraReset', today);
  }
}

// Initialize daily tracking when dashboard loads
function initializeDailyTracking() {
  checkAndResetDailyLimits();
  
  users.forEach(user => {
    if (!user.netDailyAura) {
      user.netDailyAura = {};
    }
  });
}

async function giveAura(amount=25){
  try {
    const res = await fetch('/api/give-aura', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        giverUsername: currentUser.username, 
        receiverUsername: selectedUser.username, 
        amount 
      })
    });
    
    const data = await res.json();
    
    if (data.success) {
      // Show achievement unlock notifications
      if (data.newAchievements.giver.length > 0) {
        data.newAchievements.giver.forEach(achievement => {
          showAchievementUnlock(achievement);
        });
      }
      if (data.newAchievements.receiver.length > 0) {
        data.newAchievements.receiver.forEach(achievement => {
          showAchievementUnlock(achievement);
        });
      }
      
      // Reload data and update UI
      await loadFromServer();
      
      // Find updated user data after server reload
      const giver = users.find(u => u.username === currentUser.username);
      const receiver = users.find(u => u.username === selectedUser.username);
      
      // Add aura history entries for both users
      if (giver) addAuraHistoryEntry(giver.username, giver.aura);
      if (receiver) addAuraHistoryEntry(receiver.username, receiver.aura);
      
      // Update selectedUser reference with fresh data
      selectedUser = receiver;
      
      openSlidePanel();
      renderCards();
      updateChart();
    } else {
      showNotification(data.error || 'Failed to give aura', 'error');
    }
  } catch (error) {
    console.error('Error giving aura:', error);
    showNotification('❌ Failed to give aura', 'error');
  }
}

async function removeAura(amount=25){
  try {
    const res = await fetch('/api/remove-aura', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        removerUsername: currentUser.username, 
        targetUsername: selectedUser.username, 
        amount 
      })
    });
    
    const data = await res.json();
    
    if (data.success) {
      // Show achievement unlock notifications
      if (data.newAchievements.remover.length > 0) {
        data.newAchievements.remover.forEach(achievement => {
          showAchievementUnlock(achievement);
        });
      }
      if (data.newAchievements.target.length > 0) {
        data.newAchievements.target.forEach(achievement => {
          showAchievementUnlock(achievement);
        });
      }
      
      // Reload data and update UI
      await loadFromServer();
      
      // Find updated user data after server reload
      const remover = users.find(u => u.username === currentUser.username);
      const target = users.find(u => u.username === selectedUser.username);
      
      // Add aura history entries for both users
      if (remover) addAuraHistoryEntry(remover.username, remover.aura);
      if (target) addAuraHistoryEntry(target.username, target.aura);
      
      // Update selectedUser reference with fresh data
      selectedUser = target;
      
      openSlidePanel();
      renderCards();
      updateChart();
    } else {
      showNotification(data.error || 'Failed to remove aura', 'error');
    }
  } catch (error) {
    console.error('Error removing aura:', error);
    showNotification('❌ Failed to remove aura', 'error');
  }
}

// Settings modal functionality
async function openSettings() {
  if (currentUser.role !== "admin") return;
  
  // Load current announcement
  const currentAnnouncement = await loadAnnouncement();
  const announcementInput = document.getElementById('announcementInput');
  if (announcementInput) {
    announcementInput.value = currentAnnouncement;
  }
  
  settingsModal.style.display = 'block';
  renderUsersList();
  
  // Add event listener for announcement update button
  const updateBtn = settingsModal.querySelector('.update-announcement-btn');
  if (updateBtn) {
    // Remove existing listener to prevent duplicates
    updateBtn.replaceWith(updateBtn.cloneNode(true));
    const newUpdateBtn = settingsModal.querySelector('.update-announcement-btn');
    newUpdateBtn.addEventListener('click', async () => {
      const announcementInput = document.getElementById('announcementInput');
      const newAnnouncement = announcementInput.value.trim();
      
      if (await updateAnnouncement(newAnnouncement)) {
        // Update the announcement box on login page if visible
        const announcementBox = document.getElementById('announcementBox');
        if (announcementBox) {
          announcementBox.textContent = newAnnouncement;
        }
      }
    });
  }
}

function closeSettings() {
  settingsModal.style.display = 'none';
}

function renderUsersList() {
  const usersList = document.getElementById('usersList');
  usersList.innerHTML = '';
  
  users.forEach(user => {
    const userItem = document.createElement('div');
    userItem.className = 'user-item';
    userItem.innerHTML = `
      <div class="user-info">
        <strong>${user.username}</strong> - ${user.aura} Aura - ${user.role}
      </div>
      <div class="user-actions">
        <button class="btn-small edit-btn" onclick="editUser('${user.username}')">Edit</button>
        ${user.username !== 'Max' ? `<button class="btn-small delete-btn" onclick="deleteUser('${user.username}')">Delete</button>` : ''}
      </div>
    `;
    usersList.appendChild(userItem);
  });
}

function editUser(username) {
  const user = users.find(u => u.username === username);
  
  // Create edit modal
  const editModal = document.createElement('div');
  editModal.id = 'editModal';
  editModal.style.zIndex = '2000'; // Ensure it's on top
  editModal.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal-content">
        <div class="modal-header">
          <h2>✏️ Edit User</h2>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Username:</label>
            <input type="text" id="editUsername" value="${user.username}" readonly>
          </div>
          <div class="form-group">
            <label>Password:</label>
            <input type="password" id="editPassword" placeholder="Enter new password (leave blank to keep current)">
          </div>
          <div class="form-group">
            <label>Current Aura:</label>
            <input type="number" id="editAura" value="${user.aura}" min="0" max="9999">
          </div>
          <div class="form-group">
            <label>Role:</label>
            <select id="editRole">
              <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
              <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
            </select>
          </div>
          <div class="form-actions">
            <button class="save-btn">💾 Save Changes</button>
            <button class="cancel-btn">❌ Cancel</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(editModal);
  
  // Add event listeners for edit modal
  const saveBtn = editModal.querySelector('.save-btn');
  const cancelBtn = editModal.querySelector('.cancel-btn');
  const closeBtn = editModal.querySelector('.close-modal');
  const backdrop = editModal.querySelector('.modal-backdrop');
  
  function closeEditModal() {
    document.body.removeChild(editModal);
  }
  
  saveBtn.addEventListener('click', async () => {
    const newAura = parseInt(document.getElementById('editAura').value);
    const newRole = document.getElementById('editRole').value;
    const newPassword = document.getElementById('editPassword').value.trim();
    
    if (!isNaN(newAura) && newAura >= 0) {
      user.aura = newAura;
      user.role = newRole;
      
      // Update password only if a new one is provided
      if (newPassword) {
        user.password = newPassword;
        showNotification(`Password updated for ${user.username}`, 'success');
      }
      
      renderUsersList();
      renderCards();
      await saveToServer();
      closeEditModal();
    } else {
      showNotification('Please enter a valid aura amount', 'error');
    }
  });
  
  cancelBtn.addEventListener('click', closeEditModal);
  closeBtn.addEventListener('click', closeEditModal);
  backdrop.addEventListener('click', closeEditModal);
  editModal.querySelector('.modal-content').addEventListener('click', (e) => e.stopPropagation());
}

// Notification system
function showNotification(message, type = 'info') {
  const notificationContainer = document.getElementById('notificationContainer');
  
  // Create notification element
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.innerHTML = `
    <div class="notification-content">
      <span class="notification-icon">${type === 'warning' ? '⚠️' : type === 'error' ? '❌' : '✅'}</span>
      <span class="notification-message">${message}</span>
    </div>
  `;
  
  // Add to container
  notificationContainer.appendChild(notification);
  
  // Show notification
  notification.classList.add('show');
  
  // Auto-hide after 5 seconds
  setTimeout(() => {
    notification.classList.remove('show');
    setTimeout(() => {
      if (notificationContainer.contains(notification)) {
        notificationContainer.removeChild(notification);
      }
    }, 300); // Wait for slide-out animation
  }, 5000);
}

async function deleteUser(username) {
  if (confirm(`Are you sure you want to delete ${username}?`)) {
    const index = users.findIndex(u => u.username === username);
    if (index > -1) {
      users.splice(index, 1);
      renderUsersList();
      renderCards();
      await saveToServer();
    }
  }
}

  function closeAddModal() {

    const password = document.getElementById('addPassword').value.trim();

async function resetDailyLimits() {
  if (confirm('Reset all daily limits for today?')) {
    users.forEach(user => {
      if (user.netDailyAura) {
        Object.keys(user.netDailyAura).forEach(giver => {
          user.netDailyAura[giver] = 0;
        });
      }
    });
    await saveToServer();
    alert('Daily limits reset!');
  }
}

async function resetAllAchievements() {
  if (!confirm('⚠️ WARNING: This will reset ALL achievements and set everyone to 0 aura!\n\nThis action cannot be undone. Are you absolutely sure?')) {
    return;
  }
  
  if (!confirm('🚨 FINAL WARNING: This will permanently delete every achievement and set all users to 0 aura!\n\nType "RESET" to confirm:')) {
    return;
  }
  
  try {
    const res = await fetch('/api/reset-achievements', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    
    const data = await res.json();
    
    if (data.success) {
      showNotification('✅ All achievements and aura have been reset for all users!', 'success');
      await loadFromServer();
      renderCards();
      // Refresh achievements modal if it's open
      if (achievementsModal.style.display === 'block') {
        renderAchievements();
      }
      closeSettings();
    } else {
      showNotification(data.error || 'Failed to reset achievements', 'error');
    }
  } catch (error) {
    console.error('Error resetting achievements:', error);
    showNotification('❌ Failed to reset achievements', 'error');
  }
}

function renderNameTags() {
  const nameTagGrid = document.getElementById('nameTagGrid');
  nameTagGrid.innerHTML = '';
  
  // Get current user data
  const user = users.find(u => u.username === currentUser.username);
  const userAchievements = user.achievements || [];
  const totalGiven = user.totalGiven || 0;
  const currentAura = user.aura || 0;
  const equippedNameTag = user.equippedNameTag || null;
  
  // Filter gaining achievements (based on current aura)
  const unlockedGainingAchievements = gainingAchievements.filter(achievement => 
    currentAura >= achievement.requirement
  );
  
  // Filter giving achievements (based on total given)
  const unlockedGivingAchievements = givingAchievements.filter(achievement => 
    totalGiven >= achievement.requirement
  );
  
  // Combine all unlocked achievements
  const unlockedAchievements = [...unlockedGainingAchievements, ...unlockedGivingAchievements];
  
  // Create name tag cards for unlocked achievements
  unlockedAchievements.forEach(achievement => {
    const isEquipped = equippedNameTag === achievement.id;
    const nameTagCard = createNameTagCard(achievement, isEquipped);
    nameTagGrid.appendChild(nameTagCard);
  });
  
  // If no unlocked achievements, show message
  if (unlockedAchievements.length === 0) {
    nameTagGrid.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">No unlocked achievements yet. Unlock achievements to equip name tags!</div>';
  }
}

function createNameTagCard(achievement, isEquipped) {
  const nameTagCard = document.createElement('div');
  nameTagCard.className = `name-tag-card ${isEquipped ? 'equipped' : ''}`;
  
  nameTagCard.innerHTML = `
    <div class="name-tag-status">${isEquipped ? '✅' : '🏷️'}</div>
    <div class="name-tag-name">${achievement.name}</div>
    <div class="name-tag-description">${achievement.description}</div>
    <button class="equip-btn" onclick="equipNameTag('${achievement.id}')">
      ${isEquipped ? 'Unequip' : 'Equip'}
    </button>
  `;
  
  return nameTagCard;
}

function equipNameTag(achievementId) {
  const user = users.find(u => u.username === currentUser.username);
  
  if (user.equippedNameTag === achievementId) {
    // Unequip if already equipped
    user.equippedNameTag = null;
    showNotification('🏷️ Name tag unequipped', 'success');
  } else {
    // Equip new name tag
    user.equippedNameTag = achievementId;
    
    // Find achievement name for notification
    const allAchievements = [...gainingAchievements, ...givingAchievements];
    const achievement = allAchievements.find(a => a.id === achievementId);
    showNotification(`🏷️ Equipped: ${achievement.name}`, 'success');
  }
  
  // Save to server and re-render
  saveToServer();
  renderNameTags();
  renderCards(); // Re-render cards to show updated name tag
}

function unequipAllNameTags() {
  // Remove equipped name tag from all users
  users.forEach(user => {
    if (user.equippedNameTag) {
      user.equippedNameTag = null;
    }
  });
  
  // Save to server and re-render
  saveToServer();
  renderNameTags();
  renderCards();
  showNotification('🏷️ All name tags have been unequipped!', 'success');
}

function renderAchievements() {
  const gainingGrid = document.getElementById('gainingGrid');
  const givingGrid = document.getElementById('givingGrid');
  
  gainingGrid.innerHTML = '';
  givingGrid.innerHTML = '';
  
  // Get current user data
  const user = users.find(u => u.username === currentUser.username);
  const userAchievements = user.achievements || [];
  const totalGiven = user.totalGiven || 0;
  const totalReceived = user.totalReceived || 0;
  const currentAura = user.aura || 0;
  
  // Render gaining achievements
  gainingAchievements.forEach(achievement => {
    const isUnlocked = currentAura >= achievement.requirement;
    const achievementCard = createAchievementCard(achievement, isUnlocked);
    gainingGrid.appendChild(achievementCard);
  });
  
  // Render giving achievements
  givingAchievements.forEach(achievement => {
    const isUnlocked = totalGiven >= achievement.requirement;
    const achievementCard = createAchievementCard(achievement, isUnlocked);
    givingGrid.appendChild(achievementCard);
  });
}

}

/* ======= CHART.JS GRAPH ======= */
function updateChart(){
  try {
    const canvas = document.getElementById('auraChart');
    if (!canvas) {
      console.error('Chart canvas not found');
      return;
    }
    
    const ctx = canvas.getContext('2d');
    if (!ctx) {
      console.error('Could not get canvas context');
      return;
    }
    
    // Handle case where selectedUser might be undefined
    if (!selectedUser) {
      console.error('No user selected for chart');
      return;
    }
    
    console.log('Updating chart for user:', selectedUser.username, 'Current aura:', selectedUser.aura);
    
    // Get real aura history for selected user
    const userHistory = auraHistory[selectedUser.username] || [];
    
    // If no history, create initial entry
    if (userHistory.length === 0) {
      addAuraHistoryEntry(selectedUser.username, selectedUser.aura);
    }
    
    const history = auraHistory[selectedUser.username];
    const labels = history.map(entry => entry.time);
    const data = history.map(entry => entry.aura);
    
    if(chart) {
      chart.destroy();
      chart = null;
    }
    
    chart = new Chart(ctx, {
      type: 'line',
      data: { 
        labels: labels, 
        datasets:[{ 
          label: 'Aura Over Time', 
          data: data, 
          borderColor:'#00f6ff', 
          backgroundColor:'rgba(0,246,255,0.2)', 
          tension:0.4,
          fill: true,
          pointBackgroundColor: '#00f6ff',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 5
        }] 
      },
      options:{ 
        responsive:true, 
        maintainAspectRatio: false,
        plugins:{ 
          legend:{ display:false } 
        }, 
        scales:{ 
          y:{ 
            beginAtZero:true,
            grid: {
              color: 'rgba(255,255,255,0.1)'
            },
            ticks: {
              color: 'rgba(255,255,255,0.8)'
            }
          },
          x: {
            grid: {
              color: 'rgba(255,255,255,0.1)'
            },
            ticks: {
              color: 'rgba(255,255,255,0.8)',
              maxRotation: 45,
              minRotation: 45
            }
          }
        } 
      }
    });
    
    console.log('Chart created successfully with', data.length, 'data points');
  } catch (error) {
    console.error('Error creating chart:', error);
  }
}

// Add touch-friendly swipe gestures for mobile
let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  touchEndY = e.changedTouches[0].screenY;
  handleSwipe();
}, { passive: true });

function handleSwipe() {
  const swipeThreshold = 50;
  const xDiff = touchStartX - touchEndX;
  const yDiff = touchStartY - touchEndY;
  
  // Check if it's a horizontal swipe
  if (Math.abs(xDiff) > Math.abs(yDiff)) {
    if (Math.abs(xDiff) > swipeThreshold) {
      if (xDiff > 0) {
        // Swipe left - could be used for navigation
        console.log('Swiped left');
      } else {
        // Swipe right - could be used for navigation
        console.log('Swiped right');
      }
    }
  }
  
  // Check if it's a vertical swipe
  if (Math.abs(yDiff) > swipeThreshold) {
    if (yDiff > 0) {
      // Swipe up - could open panels
      console.log('Swiped up');
    } else {
      // Swipe down - could close panels
      if (slidePanel.classList.contains('open')) {
        slidePanel.classList.remove('open');
      }
    }
  }
}
